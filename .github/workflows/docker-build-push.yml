name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      version:
        description: "Version to tag the Docker images (e.g. 1.2.3)"
        required: false
        type: string
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest-amd64: ${{ matrix.arch == 'amd64' && steps.build.outputs.digest || '' }}
      digest-arm64: ${{ matrix.arch == 'arm64' && steps.build.outputs.digest || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:build-${{ matrix.arch }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          platforms: ${{ matrix.platform }}

  create-manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for manifest
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Get digests from build jobs
        id: digests
        run: |
          # Die Digests müssen aus den Matrix-Outputs extrahiert werden
          # Da Matrix-Outputs nicht direkt verfügbar sind, nutzen wir die Tags
          echo "Waiting for digest propagation..."
          sleep 10

      - name: Create and push multi-arch manifest
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          IMAGE_NAME="${{ steps.repo.outputs.image_name }}"

          echo "Creating multi-arch manifests for tags:"
          echo "$TAGS"

          for tag in $TAGS; do
            echo "Creating manifest for: $tag"
            docker buildx imagetools create -t $tag \
              ${{ env.REGISTRY }}/${IMAGE_NAME}:build-amd64-${{ github.sha }} \
              ${{ env.REGISTRY }}/${IMAGE_NAME}:build-arm64-${{ github.sha }}
          done

          echo "✅ Multi-arch manifests created successfully"

      - name: Generate deployment summary
        run: |
          IMAGE_NAME="${{ steps.repo.outputs.image_name }}"
          echo "## 🚀 Docker Image Published (Multi-Arch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### FinanceVault - Single Binary Architecture" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture**: Backend with embedded frontend proxy" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### How it works:" >> $GITHUB_STEP_SUMMARY
          echo "- Backend runs on port **8000** (Rust/Axum)" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend runs on port **3000** (SvelteKit/Node, internal only)" >> $GITHUB_STEP_SUMMARY
          echo "- Backend proxies all non-API requests to frontend" >> $GITHUB_STEP_SUMMARY
          echo "- Single entry point: **http://localhost:8000**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:latest" >> $GITHUB_STEP_SUMMARY
          echo "# Docker wählt automatisch die richtige Architektur (amd64/arm64)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run Command" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -d \\" >> $GITHUB_STEP_SUMMARY
          echo "  -p 8000:8000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v financevault_data:/data \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e JWT_SECRET=\$(openssl rand -hex 32) \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${IMAGE_NAME}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access the Application" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Interface**: http://localhost:8000" >> $GITHUB_STEP_SUMMARY
          echo "- **API Docs**: http://localhost:8000/swagger-ui" >> $GITHUB_STEP_SUMMARY
          echo "- **API Endpoint**: http://localhost:8000/api" >> $GITHUB_STEP_SUMMARY
