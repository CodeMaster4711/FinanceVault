name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      version:
        description: "Version to tag the Docker images (e.g. 1.2.3)"
        required: false
        type: string
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest-amd64: ${{ matrix.arch == 'amd64' && steps.build.outputs.digest || '' }}
      digest-arm64: ${{ matrix.arch == 'arm64' && steps.build.outputs.digest || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export ${{ matrix.arch }} image to registry
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}:temp-${{ matrix.arch }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          provenance: false

  create-manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for manifest
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          IMAGE_NAME="${{ steps.repo.outputs.image_name }}"

          echo "Creating multi-arch manifests for tags:"
          echo "$TAGS"

          for tag in $TAGS; do
            echo "Creating manifest for: $tag"
            docker buildx imagetools create -t $tag \
              ${{ env.REGISTRY }}/${IMAGE_NAME}:temp-amd64-${{ github.sha }} \
              ${{ env.REGISTRY }}/${IMAGE_NAME}:temp-arm64-${{ github.sha }}
          done

          echo "✅ Multi-arch manifests created successfully"

      - name: Cleanup temporary tags
        if: always()
        continue-on-error: true
        run: |
          IMAGE_NAME="${{ steps.repo.outputs.image_name }}"

          echo "🧹 Cleaning up temporary build tags..."

          # Funktion zum Löschen eines Tags über GitHub API
          delete_tag() {
            local tag=$1
            echo "Attempting to delete tag: $tag"
            
            # Versuche das Package über die GitHub Container Registry API zu löschen
            # Hinweis: Dies funktioniert nur, wenn der Tag noch nicht in einem Manifest verwendet wird
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
            
            # Hole alle Versionen des Packages
            VERSIONS=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/packages/container/${IMAGE_NAME}/versions" | \
              jq -r '.[] | select(.metadata.container.tags[]? == "'${tag}'") | .id' 2>/dev/null || echo "")
            
            if [ -n "$VERSIONS" ]; then
              for VERSION_ID in $VERSIONS; do
                echo "Deleting version ID: $VERSION_ID"
                curl -X DELETE \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/user/packages/container/${IMAGE_NAME}/versions/${VERSION_ID}" 2>/dev/null || true
              done
            else
              echo "No version found for tag: $tag (may already be cleaned up)"
            fi
          }

          # Lösche temporäre Tags
          delete_tag "temp-amd64-${{ github.sha }}"
          delete_tag "temp-arm64-${{ github.sha }}"

          echo "✅ Cleanup completed"

      - name: Generate deployment summary
        run: |
          IMAGE_NAME="${{ steps.repo.outputs.image_name }}"
          echo "## 🚀 Docker Image Published (Multi-Arch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### FinanceVault - Single Binary Architecture" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture**: Backend with embedded frontend proxy" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### How it works:" >> $GITHUB_STEP_SUMMARY
          echo "- Backend runs on port **8000** (Rust/Axum)" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend runs on port **3000** (SvelteKit/Node, internal only)" >> $GITHUB_STEP_SUMMARY
          echo "- Backend proxies all non-API requests to frontend" >> $GITHUB_STEP_SUMMARY
          echo "- Single entry point: **http://localhost:8000**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:latest" >> $GITHUB_STEP_SUMMARY
          echo "# Docker wählt automatisch die richtige Architektur (amd64/arm64)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run Command" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -d \\" >> $GITHUB_STEP_SUMMARY
          echo "  -p 8000:8000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v financevault_data:/data \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e JWT_SECRET=\$(openssl rand -hex 32) \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${IMAGE_NAME}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access the Application" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Interface**: http://localhost:8000" >> $GITHUB_STEP_SUMMARY
          echo "- **API Docs**: http://localhost:8000/swagger-ui" >> $GITHUB_STEP_SUMMARY
          echo "- **API Endpoint**: http://localhost:8000/api" >> $GITHUB_STEP_SUMMARY
